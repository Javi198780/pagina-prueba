<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biblio Chatbot</title>

<style>
#chatBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #007bff;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
}

#chatModal {
  display: none;
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 400px;
  height: 550px;
  background: white;
  border: 1px solid #ccc;
}

#chatModal iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<h2>Página de prueba del Chatbot</h2>

<!-- Botón flotante -->
<button id="chatBtn" onclick="abrirChat()">💬</button>

<!-- Modal con tu ASPX -->
<div id="chatModal">
  <iframe src="https://www.pucei.edu.ec:4080/REGISTRO/bibliochatbot.ASPX"></iframe>
</div>

<script>
function abrirChat() {
  var modal = document.getElementById("chatModal");
  modal.style.display = modal.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
